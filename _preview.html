<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Alfred animace – náhled</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
<style>
  body { font-family: -apple-system, sans-serif; background: #f2f4f7; color: #1a1a1a; margin: 0; padding: 24px; }
  h1 { font-size: 18px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 12px;
    text-align: center;
    box-shadow: 0 8px 24px rgba(20, 30, 60, 0.10), 0 2px 6px rgba(20, 30, 60, 0.06);
  }

  .stage {
    position: relative;
    width: 100%;
    height: 180px;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* soft radial-gradient blob behind the animation, tinted per accent color.
     neutral (in-progress) cards have no --accent set, so they fall back to the brand picker. */
  .stage::before {
    content: "";
    position: absolute;
    width: 78%;
    height: 78%;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent-soft, var(--brand-soft)) 0%, var(--accent-soft, var(--brand-soft)) 45%, transparent 72%);
    filter: blur(2px);
    transition: background 0.3s ease;
  }

  /* floating accent dots for a bit of depth/movement, like the reference */
  .dot {
    position: absolute;
    border-radius: 50%;
    background: var(--accent, var(--brand));
    opacity: 0.55;
    animation: float 3.6s ease-in-out infinite;
    transition: background 0.3s ease;
  }
  .dot--1 { width: 10px; height: 10px; top: 18%; left: 22%; animation-delay: 0s; }
  .dot--2 { width: 6px;  height: 6px;  top: 28%; right: 20%; animation-delay: 1.2s; }
  .dot--3 { width: 8px;  height: 8px;  bottom: 20%; right: 28%; animation-delay: 2.1s; }

  @keyframes float {
    0%, 100% { transform: translateY(0); opacity: 0.35; }
    50%      { transform: translateY(-8px); opacity: 0.75; }
  }

  .anim { position: relative; width: 100%; height: 100%; z-index: 1; }

  .name { font-size: 12px; margin-top: 8px; word-break: break-all; opacity: 0.65; }
  button { margin-top: 6px; font-size: 11px; padding: 4px 10px; cursor: pointer; border: none; border-radius: 6px; background: #eef1f6; }
  button:hover { background: #e2e6ee; }

  .brand-picker { margin: 0 0 20px; display: flex; gap: 8px; align-items: center; }
  .brand-picker span { font-size: 12px; opacity: 0.6; margin-right: 4px; }
  .swatch { width: 28px; height: 28px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
  .swatch.active { border-color: #1a1a1a; }
</style>
</head>
<body>
<h1>Alfred – náhled animací</h1>
<div class="brand-picker">
  <span>Brand barva (ovlivňuje jen neutrální/probíhající animace):</span>
  <div id="swatches" style="display:flex; gap:8px;"></div>
</div>
<div class="grid" id="grid"></div>
<script>
// accent color per sémantice animace (úspěch/chyba jsou fixní, neutrální/probíhající sleduje brand)
const ACCENTS = {
  success: { accent: "#22c55e", soft: "#dcfce7" },
  error:   { accent: "#ef4444", soft: "#fee2e2" },
  denied:  { accent: "#ef4444", soft: "#fee2e2" },
  fail:    { accent: "#ef4444", soft: "#fee2e2" },
  neutral: null, // necháváme nenastavené -> CSS spadne na var(--brand)/var(--brand-soft)
};

function accentFor(name) {
  if (/success/.test(name)) return ACCENTS.success;
  if (/error|denied|fail/.test(name)) return ACCENTS.error;
  return ACCENTS.neutral;
}

const BRANDS = [
  { name: "plum",    hex: "#5B2A5E" },
  { name: "red",     hex: "#C6273A" },
  { name: "orange",  hex: "#E0662B" },
  { name: "amber",   hex: "#EDA430" },
  { name: "olive",   hex: "#7CA033" },
  { name: "teal",    hex: "#27A07C" },
  { name: "sky",     hex: "#2C93C9" },
  { name: "blue",    hex: "#3C63C9" },
  { name: "magenta", hex: "#BD4C93" },
  { name: "slate",   hex: "#3F4350" },
];

function softTint(hex) {
  const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  const mix = (c) => Math.round(c + (255 - c) * 0.82);
  return `rgb(${mix(r)}, ${mix(g)}, ${mix(b)})`;
}

function setBrand(hex) {
  document.documentElement.style.setProperty("--brand", hex);
  document.documentElement.style.setProperty("--brand-soft", softTint(hex));
}

const swatchesEl = document.getElementById("swatches");
BRANDS.forEach((b, i) => {
  const sw = document.createElement("div");
  sw.className = "swatch" + (i === 0 ? " active" : "");
  sw.style.background = b.hex;
  sw.onclick = () => {
    document.querySelectorAll(".swatch").forEach(s => s.classList.remove("active"));
    sw.classList.add("active");
    setBrand(b.hex);
  };
  swatchesEl.appendChild(sw);
});
setBrand(BRANDS[0].hex);

const files = [
  "alfred-idcard-mobile.json",
  "check-out.json",
  "credit-card-error.json",
  "credit-card-success.json",
  "credit-card-terminal.json",
  "encoder-card-take-and-place.json",
  "encoder-card-wait-to-beep.json",
  "key-issuing.json",
  "mrz-scan.json",
  "open-door-denied.json",
  "open-door-loader.json",
  "open-door-success.json",
  "success-checkmark-check-in.json",
  "success-checkmark.json",
  "salto/bluetooth_key_communication.json",
  "salto/bluetooth_key_open_fail.json",
  "salto/bluetooth_key_open_success.json",
  "salto/put_phone_closer_to_lock.json",
];

const grid = document.getElementById("grid");
const anims = [];

files.forEach(f => {
  const colors = accentFor(f); // null pro neutrální -> spadne na var(--brand)/var(--brand-soft)

  const card = document.createElement("div");
  card.className = "card";

  const stage = document.createElement("div");
  stage.className = "stage";
  if (colors) {
    stage.style.setProperty("--accent", colors.accent);
    stage.style.setProperty("--accent-soft", colors.soft);
  }

  ["dot--1", "dot--2", "dot--3"].forEach(cls => {
    const dot = document.createElement("div");
    dot.className = `dot ${cls}`;
    stage.appendChild(dot);
  });

  const animDiv = document.createElement("div");
  animDiv.className = "anim";
  stage.appendChild(animDiv);

  const name = document.createElement("div");
  name.className = "name";
  name.textContent = f;

  const btn = document.createElement("button");
  btn.textContent = "replay";

  card.appendChild(stage);
  card.appendChild(name);
  card.appendChild(btn);
  grid.appendChild(card);

  const anim = lottie.loadAnimation({
    container: animDiv,
    renderer: "svg",
    loop: true,
    autoplay: true,
    path: f + "?_=" + Date.now(),
  });
  btn.onclick = () => anim.goToAndPlay(0);
  anims.push(anim);
});
</script>
</body>
</html>
